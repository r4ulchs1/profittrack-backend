name: Deploy de DO

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy a través de SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: DB_URL,DB_USER,DB_PASSWORD,JWT_SECRET,JWT_ACCESS_EXPIRATION,CORS_ALLOWED_ORIGINS
          script: |
            cd /opt/apps/profittrack-backend

            git pull origin main

            echo "PORT=8080" > .env
            echo "DATABASE_URL=$DB_URL" >> .env
            echo "DATABASE_USER=$DB_USER" >> .env
            echo "DATABASE_PASSWORD=$DB_PASSWORD" >> .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "JWT_ACCESS_EXPIRATION=$JWT_ACCESS_EXPIRATION" >> .env
            echo "CORS_ALLOWED_ORIGINS=$CORS_ALLOWED_ORIGINS" >> .env

            docker compose up -d --build
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRATION: ${{ secrets.JWT_ACCESS_EXPIRATION }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
